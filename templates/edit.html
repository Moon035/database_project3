<!DOCTYPE html>
<html>
<head>
    <title>Edit Device</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">
<h1>Edit Device for {{ user.username }}</h1>

<div class="nav">
    <a href="/user/{{ user.user_id }}">Back to Device List</a>
    <a href="/user/{{ user.user_id }}/dashboard">Dashboard</a>
    <a href="/user/{{ user.user_id }}/logs">View Logs</a>
</div>


<form method="post">
    <label for="device_name">Name:</label>
    <input type="text" id="device_name" name="device_name" value="{{ device.device_name }}" required>

    <label for="device_type">Type:</label>
    <input type="text" id="device_type" name="device_type" value="{{ device.device_type }}" required>

    <label for="status">Status:</label>
    <select id="status" name="status">
        <option value="ON" {% if device.status == 'ON' %}selected{% endif %}>ON</option>
        <option value="OFF" {% if device.status == 'OFF' %}selected{% endif %}>OFF</option>
        <option value="STANDBY" {% if device.status == 'STANDBY' %}selected{% endif %}>STANDBY</option>
        <option value="ERROR" {% if device.status == 'ERROR' %}selected{% endif %}>ERROR</option>
    </select>


    <label for="room_id">Room:</label>
    <select id="room_id" name="room_id">
        {% for r in rooms %}
        <option value="{{ r.room_id }}" {% if r.room_id == device.room_id %}selected{% endif %}>
            {{ r.room_name }}
        </option>
        {% endfor %}
    </select>


    <label for="power_usage_watts">Power Usage:</label>
    <input type="number" step="0.01" id="power_usage_watts" name="power_usage_watts" value="{{ device.power_usage_watts }}" required>


    <button type="submit">Update Device</button>
</form>
</div>
</body>
</html>
