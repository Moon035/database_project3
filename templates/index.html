<!DOCTYPE html>
<html>
<head>
    <title>Select User</title>
</head>
<body>

<h1>Select a User</h1>

{% if users %}
<ul>
    {% for user in users %}
    <li>
        <a href="/user/{{ user.user_id }}">{{ user.username }}</a>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No users found.</p>
{% endif %}

</body>
</html>
